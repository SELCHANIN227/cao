<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#151823" />
  <title>Ćao! — сербский через короткие уроки</title>
  <meta name="description" content="Игровой тренажёр сербского языка: уроки, повторение слов, серии, XP и озвучка." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar" aria-label="Основная навигация">
      <a class="brand" href="#" data-screen-link="learn" aria-label="Ćao! На главную">
        <span class="brand-mark" aria-hidden="true">Ć</span>
        <span class="brand-text">Ćao!</span>
      </a>
      <nav class="side-nav">
        <button class="nav-item active" data-screen-link="learn"><span class="nav-ico">⌂</span><span>Учиться</span></button>
        <button class="nav-item" data-screen-link="review"><span class="nav-ico">↻</span><span>Повторение</span><span id="reviewBadge" class="nav-badge hidden">0</span></button>
        <button class="nav-item" data-screen-link="words"><span class="nav-ico">Aa</span><span>Словарь</span></button>
        <button class="nav-item" data-screen-link="profile"><span class="nav-ico">☺</span><span>Профиль</span></button>
      </nav>
      <div class="sidebar-card">
        <div class="mini-character" id="sidebarCharacter"></div>
        <div>
          <strong>Дневная цель</strong>
          <p><span id="dailyXpSide">0</span>/<span id="dailyGoalSide">20</span> XP</p>
        </div>
      </div>
    </aside>

    <main class="main-area">
      <header class="topbar">
        <button class="mobile-menu" id="mobileMenu" aria-label="Открыть меню">☰</button>
        <div class="top-stat" title="Текущая серия"><span>🔥</span><b id="streakTop">0</b></div>
        <div class="top-stat" title="Опыт за сегодня"><span>⚡</span><b id="xpTop">0</b></div>
        <div class="top-stat" title="Сердца"><span>♥</span><b id="heartsTop">5</b></div>
      </header>

      <section id="screen-learn" class="screen active"></section>
      <section id="screen-review" class="screen"></section>
      <section id="screen-words" class="screen"></section>
      <section id="screen-profile" class="screen"></section>
    </main>

    <aside class="right-rail">
      <section class="rail-card daily-card">
        <div class="rail-title-row"><h3>Дневная цель</h3><span id="dailyGoalLabel">20 XP</span></div>
        <div class="goal-ring-wrap">
          <svg class="goal-ring" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="goal-ring-track" cx="60" cy="60" r="48"></circle>
            <circle id="goalRingValue" class="goal-ring-value" cx="60" cy="60" r="48"></circle>
          </svg>
          <div class="goal-ring-text"><b id="goalPercent">0%</b><span>сегодня</span></div>
        </div>
        <p id="dailyMotivation">Начни первый урок — и серия пойдёт.</p>
      </section>
      <section class="rail-card phrase-card">
        <div class="phrase-head"><span class="phrase-dot"></span><span>Фраза дня</span></div>
        <button id="phraseSpeak" class="speak-btn" aria-label="Произнести фразу">🔊</button>
        <div id="phraseCharacter" class="phrase-character"></div>
        <h3 id="phraseSr">Kako si?</h3>
        <p id="phraseRu">Как ты?</p>
      </section>
    </aside>
  </div>

  <div id="lessonOverlay" class="lesson-overlay hidden" role="dialog" aria-modal="true" aria-label="Урок">
    <div class="lesson-top">
      <button id="closeLesson" class="icon-button" aria-label="Закрыть урок">×</button>
      <div class="lesson-progress"><span id="lessonProgressBar"></span></div>
      <div class="lesson-hearts">♥ <b id="lessonHearts">5</b></div>
    </div>
    <div id="lessonStage" class="lesson-stage"></div>
    <div id="lessonFeedback" class="lesson-feedback hidden"></div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="audio-manifest.js"></script>
  <script src="app.js"></script>
</body>
</html>
